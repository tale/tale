- defaults:
    link:
        create: true
        relink: true
    shell:
        stderr: true
- clean: ["~"]
- shell:
    - [git submodule update --init --recursive, Installing Submodules]
- brewfile:
    file: Brewfile
- link:
    ~/.zsh/aliases: shell/aliases.zsh
    ~/.zsh/plugins: shell/plugins.txt
    ~/.zshrc: shell/zshrc.zsh

    ~/.eslintrc: linters/.eslintrc

    ~/.gitconfig: git/.gitconfig
    ~/.gitignore: git/.gitignore
    ~/.git/macbook-pro.gitconfig: git/macbook-pro.gitconfig
    ~/.git/linux-machine.gitconfig: git/linux-machine.gitconfig
